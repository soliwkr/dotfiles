# See https://wiki.hyprland.org/Configuring/Monitors/
# List current monitors: hyprctl monitors

# Dell Precision 5550 — 4K OLED internal + external monitor
# Internal 4K (3840x2400): scale 2 = effective 1920x1200
# GDK_SCALE 2 for crisp GTK/electron apps at 4K
env = GDK_SCALE,2

monitor=eDP-1,3840x2400@60,0x0,2
monitor=,preferred,auto,1

# If external is also 4K:
# monitor=,preferred,auto,2

# Portrait secondary (uncomment if needed):
# monitor=DP-2,preferred,auto,1,transform,1

# Fallback — any unrecognised monitor
monitor=,preferred,auto,auto
